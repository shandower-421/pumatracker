<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PumaTracker — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0f11; --surface: #16181c; --surface2: #1e2128;
  --border: #2a2d35; --border2: #363a45;
  --text: #e8eaf0; --text-dim: #7a7f8e; --text-faint: #3e4252;
  --accent: #5b8af0; --p-high: #f05b5b; --s-done: #5bf0a0;
}
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 48px 40px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  animation: up 0.4s cubic-bezier(0.22,1,0.36,1);
}
@keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.logo span { color: #e07828; }
.subtitle { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 36px; }
label { display: block; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
input[type=text], input[type=password] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.95rem;
  padding: 11px 14px;
  outline: none;
  margin-bottom: 20px;
  transition: border-color 0.15s;
}
input:focus { border-color: var(--accent); }
.btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 12px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.flash {
  background: rgba(240,91,91,0.12);
  border: 1px solid rgba(240,91,91,0.3);
  border-radius: 6px;
  color: #f05b5b;
  font-size: 0.85rem;
  padding: 10px 14px;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Puma<span>Tracker</span></div>
  <div class="subtitle">Sign in to your workspace</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" autofocus required />
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password" required />
    <button class="btn" type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
